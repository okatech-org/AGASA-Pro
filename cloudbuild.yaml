steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_CONVEX_URL=https://sensible-clam-597.eu-west-1.convex.cloud'
      - '--build-arg'
      - 'NEXT_PUBLIC_CONVEX_SITE_URL=https://sensible-clam-597.eu-west-1.convex.site'
      - '--build-arg'
      - 'NEXT_PUBLIC_ENABLE_DEMO_MODE=true'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=demo-dummy-key'
      - '-t'
      - 'gcr.io/digitalium-ga/agasa-pro'
      - '.'

images:
  - 'gcr.io/digitalium-ga/agasa-pro'

timeout: '1200s'
