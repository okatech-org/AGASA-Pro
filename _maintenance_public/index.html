<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGASA Digital — En Travaux</title>
  <meta name="description" content="AGASA Digital est actuellement en cours de maintenance. Nous revenons bientôt avec une version améliorée.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      overflow: hidden;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      animation: bgShift 15s ease-in-out infinite;
    }

    @keyframes bgShift {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Grid pattern */
    .grid-pattern {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .container {
      position: relative; z-index: 10;
      text-align: center;
      max-width: 580px;
      padding: 2rem;
      animation: fadeUp 1s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Shield icon */
    .icon-wrapper {
      width: 80px; height: 80px;
      margin: 0 auto 2rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
      border: 1px solid rgba(255,255,255,0.08);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.15); }
      50% { box-shadow: 0 0 40px 10px rgba(16,185,129,0.08); }
    }

    .icon-wrapper svg {
      width: 36px; height: 36px;
      color: #10b981;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e4e4e7, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.2);
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      margin: 0 auto 2rem;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #10b981, #3b82f6);
      border-radius: 3px;
      animation: loading 2s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .footer {
      font-size: 0.8rem;
      color: #52525b;
    }
    .footer a {
      color: #71717a;
      text-decoration: none;
    }
    .footer a:hover { color: #a1a1aa; }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.15);
      z-index: 2;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-pattern"></div>

  <!-- Animated particles -->
  <div class="particle" style="width:4px;height:4px;left:10%;animation-duration:8s;animation-delay:0s"></div>
  <div class="particle" style="width:3px;height:3px;left:25%;animation-duration:12s;animation-delay:2s"></div>
  <div class="particle" style="width:5px;height:5px;left:45%;animation-duration:10s;animation-delay:4s"></div>
  <div class="particle" style="width:3px;height:3px;left:65%;animation-duration:14s;animation-delay:1s"></div>
  <div class="particle" style="width:4px;height:4px;left:80%;animation-duration:9s;animation-delay:3s"></div>
  <div class="particle" style="width:2px;height:2px;left:90%;animation-duration:11s;animation-delay:5s"></div>

  <div class="container">
    <div class="icon-wrapper">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085" />
      </svg>
    </div>

    <div class="badge">En cours de maintenance</div>

    <h1>AGASA Digital</h1>

    <p>
      Notre plateforme est actuellement en phase de restructuration technique.
      Nous travaillons à l'amélioration de nos services pour vous offrir
      une expérience optimale.
    </p>

    <div class="progress-bar"></div>

    <div class="footer">
      <p>&copy; 2026 AGASA — Agence Gabonaise de Sécurité Alimentaire</p>
      <p>Contact : <a href="mailto:support@agasa.ga">support@agasa.ga</a></p>
    </div>
  </div>
</body>
</html>
